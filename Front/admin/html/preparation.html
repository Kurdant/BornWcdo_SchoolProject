<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCDO Admin — Préparation</title>
    <link rel="stylesheet" href="../css/preparation.css">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-brand">
            <h1>🍔 WCDO</h1>
            <span class="subtitle">Préparation</span>
        </div>
        <div class="header-user">
            <span>👤 <strong id="user-nom">…</strong></span>
            <button class="btn-logout-header" onclick="logout()">🚪 Déconnexion</button>
        </div>
    </header>

    <!-- ===== STATUS BAR ===== -->
    <div class="status-bar">
        <div class="status-left">
            <div><span class="status-count" id="count-attente">—</span><span class="label">en attente</span></div>
            <div id="last-refresh" class="refresh-info">Actualisation…</div>
        </div>
        <button class="btn-refresh" onclick="loadCommandes(true)">🔄 Actualiser</button>
    </div>

    <!-- ===== MAIN ===== -->
    <main class="main" id="main">
        <div class="empty-state" id="empty-state" style="display:none;">
            <div class="icon">✅</div>
            <h2>Aucune commande en attente</h2>
            <p>Toutes les commandes ont été préparées. Bon travail !</p>
        </div>
        <div class="orders-grid" id="orders-grid"></div>
    </main>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner-large"></div>
    </div>

    <div class="toast-container"></div>

    <script src="../js/utils.js"></script>
    <script src="../js/preparation.js"></script>
</body>
</html>

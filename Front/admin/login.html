<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCDO Admin — Connexion</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo .icon {
            font-size: 3rem;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #e63946;
            letter-spacing: 3px;
        }
        .logo p {
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.4rem;
        }

        .input-wrapper { position: relative; }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #333;
            transition: border-color 0.2s;
            outline: none;
            background: #fafafa;
        }
        input:focus { border-color: #e63946; background: #fff; }

        .toggle-pwd {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #aaa;
            padding: 0.2rem;
            transition: color 0.2s;
        }
        .toggle-pwd:hover { color: #555; }

        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: #e63946;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
        }
        .btn-primary:hover { background: #c1121f; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        .error-msg {
            background: #fff5f5;
            color: #c1121f;
            border: 1px solid #fdd;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.88rem;
            margin-bottom: 1.25rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        .error-msg.visible { display: flex; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider {
            text-align: center;
            color: #ccc;
            font-size: 0.8rem;
            margin: 1.5rem 0 1rem;
        }
        .version-tag {
            text-align: center;
            margin-top: 1.5rem;
            color: #ccc;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="icon">🍔</div>
            <h1>WCDO</h1>
            <p>Espace Administration</p>
        </div>

        <div class="error-msg" id="error-msg">
            <span>⚠️</span>
            <span id="error-text"></span>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" placeholder="nom@wcdo.fr" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pwd" id="toggle-pwd" title="Afficher/masquer">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-submit">Se connecter</button>
        </form>

        <div class="version-tag">WCDO Back-Office v2.0</div>
    </div>

    <script>
        /* ==========================================
           REDIRECTION SI DÉJÀ CONNECTÉ
        ========================================== */
        (function () {
            const role = sessionStorage.getItem('admin_role');
            if (role) redirectByRole(role);
        })();

        function redirectByRole(role) {
            const routes = {
                'administration': 'index.html',
                'preparation':    'preparation.html',
                'accueil':        'accueil-bo.html'
            };
            window.location.href = routes[role] || 'index.html';
        }

        /* ==========================================
           TOGGLE VISIBILITÉ MOT DE PASSE
        ========================================== */
        document.getElementById('toggle-pwd').addEventListener('click', function () {
            const input = document.getElementById('password');
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            this.textContent = isHidden ? '🙈' : '👁️';
        });

        /* ==========================================
           SOUMISSION DU FORMULAIRE
        ========================================== */
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btn-submit');

            hideError();

            // Validation basique
            if (!email || !password) {
                showError('Veuillez remplir tous les champs.');
                return;
            }

            // Loader
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Connexion en cours…';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, mot_de_passe: password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Stocker les infos dans sessionStorage
                    sessionStorage.setItem('admin_role', result.data.role);
                    sessionStorage.setItem('admin_nom',  result.data.nom);
                    sessionStorage.setItem('admin_id',   result.data.id);

                    // Rediriger selon le rôle
                    redirectByRole(result.data.role);
                } else {
                    showError(result.error || 'Email ou mot de passe incorrect.');
                }
            } catch (err) {
                console.error('Erreur login:', err);
                showError('Impossible de contacter le serveur. Vérifiez votre connexion.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        });

        function showError(msg) {
            const div = document.getElementById('error-msg');
            document.getElementById('error-text').textContent = msg;
            div.classList.add('visible');
        }
        function hideError() {
            document.getElementById('error-msg').classList.remove('visible');
        }
    </script>
</body>
</html>

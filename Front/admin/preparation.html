<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCDO — Préparation des commandes</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

        /* === HEADER === */
        .header {
            background: #16213e;
            padding: 1rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #e63946;
            position: sticky; top: 0; z-index: 50;
        }
        .header-brand { display: flex; align-items: center; gap: 0.75rem; }
        .header-brand h1 { font-size: 1.3rem; font-weight: 900; color: #e63946; letter-spacing: 1px; }
        .header-brand .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .header-user { display: flex; align-items: center; gap: 1.25rem; font-size: 0.9rem; color: rgba(255,255,255,0.75); }
        .header-user strong { color: #fff; }
        .btn-logout-header {
            padding: 0.5rem 1rem; background: rgba(230,57,70,0.15); color: #e63946;
            border: 1px solid rgba(230,57,70,0.4); border-radius: 6px;
            cursor: pointer; font-size: 0.85rem; font-family: inherit; font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }
        .btn-logout-header:hover { background: #e63946; color: #fff; }

        /* === STATUS BAR === */
        .status-bar {
            background: #0f3460;
            padding: 0.6rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.82rem;
        }
        .status-left { display: flex; align-items: center; gap: 1.5rem; color: rgba(255,255,255,0.7); }
        .status-count { font-size: 1rem; font-weight: 700; color: #fff; }
        .status-count .label { font-size: 0.78rem; font-weight: 400; color: rgba(255,255,255,0.5); margin-left: 0.3rem; }
        .refresh-info { color: rgba(255,255,255,0.45); font-size: 0.78rem; }
        .btn-refresh { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); padding: 0.35rem 0.7rem; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .btn-refresh:hover { background: rgba(255,255,255,0.08); color: #fff; }

        /* === MAIN === */
        .main { padding: 1.5rem; }
        .empty-state {
            text-align: center; padding: 5rem 2rem; color: rgba(255,255,255,0.4);
        }
        .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.9rem; }

        /* === GRILLE DE COMMANDES === */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        /* === CARD COMMANDE === */
        .order-card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.15s, box-shadow 0.15s;
            animation: cardIn 0.3s ease;
        }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .card-top {
            background: #0f3460;
            padding: 1rem 1.25rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .order-num {
            font-size: 1.7rem; font-weight: 900; color: #fff;
            letter-spacing: 1px;
        }
        .order-num span { font-size: 0.85rem; font-weight: 400; color: rgba(255,255,255,0.5); display: block; }
        .type-badge {
            padding: 0.3rem 0.75rem; border-radius: 20px;
            font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px;
        }
        .type-sur-place  { background: rgba(42,157,143,0.25); color: #4dd0c4; border: 1px solid rgba(42,157,143,0.4); }
        .type-a-emporter { background: rgba(255,152,0,0.2); color: #ffb74d; border: 1px solid rgba(255,152,0,0.35); }

        .card-body { padding: 1rem 1.25rem; }

        .card-meta {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 0.9rem; font-size: 0.83rem; color: rgba(255,255,255,0.55);
        }
        .card-meta .chevalet { font-size: 0.9rem; color: rgba(255,255,255,0.75); font-weight: 600; }
        .heure-livraison {
            font-size: 0.83rem; font-weight: 700;
            padding: 0.2rem 0.5rem; border-radius: 5px;
        }
        .heure-normale  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.65); }
        .heure-urgente  { background: rgba(230,57,70,0.25); color: #ff6b7a; border: 1px solid rgba(230,57,70,0.4); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .products-title { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .products-list { list-style: none; }
        .products-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.86rem; color: rgba(255,255,255,0.8);
        }
        .products-list li:last-child { border-bottom: none; }
        .products-list li .qty {
            background: rgba(230,57,70,0.25); color: #ff6b7a;
            padding: 0.1rem 0.45rem; border-radius: 4px;
            font-size: 0.78rem; font-weight: 700; flex-shrink: 0;
        }

        .card-footer { padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.06); }
        .btn-prete {
            width: 100%; padding: 0.85rem;
            background: #2a9d8f; color: #fff; border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }
        .btn-prete:hover   { background: #21867a; }
        .btn-prete:active  { transform: scale(0.98); }
        .btn-prete:disabled { background: #444; cursor: not-allowed; }

        /* === LOADING === */
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(26,26,46,0.8);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; display: none;
        }
        .loading-overlay.show { display: flex; }
        .spinner-large {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.1); border-top-color: #e63946;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === TOAST === */
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.8rem 1.2rem; border-radius: 8px; color: #fff; font-size: 0.88rem; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.4); min-width: 240px; animation: slideIn 0.3s ease; }
        .toast-success { background: #2a9d8f; } .toast-error { background: #e63946; } .toast-info { background: #0f3460; border: 1px solid rgba(255,255,255,0.15); }
        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-brand">
            <h1>🍔 WCDO</h1>
            <span class="subtitle">Préparation</span>
        </div>
        <div class="header-user">
            <span>👤 <strong id="user-nom">…</strong></span>
            <button class="btn-logout-header" onclick="logout()">🚪 Déconnexion</button>
        </div>
    </header>

    <!-- ===== STATUS BAR ===== -->
    <div class="status-bar">
        <div class="status-left">
            <div><span class="status-count" id="count-attente">—</span><span class="label">en attente</span></div>
            <div id="last-refresh" class="refresh-info">Actualisation…</div>
        </div>
        <button class="btn-refresh" onclick="loadCommandes(true)">🔄 Actualiser</button>
    </div>

    <!-- ===== MAIN ===== -->
    <main class="main" id="main">
        <div class="empty-state" id="empty-state" style="display:none;">
            <div class="icon">✅</div>
            <h2>Aucune commande en attente</h2>
            <p>Toutes les commandes ont été préparées. Bon travail !</p>
        </div>
        <div class="orders-grid" id="orders-grid"></div>
    </main>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner-large"></div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        /* ==========================================
           ÉTAT GLOBAL
        ========================================== */
        let commandesEnAttente = [];  // liste courante
        let refreshTimer = null;
        const REFRESH_INTERVAL = 30000; // 30 secondes
        let audioCtx = null;            // Web Audio API context

        /* ==========================================
           UTILS
        ========================================== */
        async function checkAuth(roles = []) {
            const role = sessionStorage.getItem('admin_role');
            const nom  = sessionStorage.getItem('admin_nom');
            if (!role) { window.location.href = 'login.html'; return null; }
            if (roles.length && !roles.includes(role)) { window.location.href = 'index.html'; return null; }
            return { role, nom };
        }
        async function logout() {
            try { await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
            sessionStorage.clear(); window.location.href = 'login.html';
        }
        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`; t.textContent = msg; c.appendChild(t);
            setTimeout(() => { t.style.transition = 'opacity 0.3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3500);
        }
        async function apiFetch(url, options = {}) {
            const res = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...options });
            if (res.status === 401) { window.location.href = 'login.html'; return null; }
            return res;
        }

        /* ==========================================
           SON DE NOTIFICATION (Web Audio API)
        ========================================== */
        function playNotifSound() {
            try {
                // Créer le contexte audio au premier interaction utilisateur
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // Bip double ascendant
                [523, 659].forEach((freq, i) => {
                    const osc  = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type      = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.18);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.18 + 0.35);
                    osc.start(audioCtx.currentTime + i * 0.18);
                    osc.stop(audioCtx.currentTime + i * 0.18 + 0.36);
                });
            } catch (e) { /* Web Audio non disponible */ }
        }

        // Initialiser l'AudioContext au premier clic (politique navigateur)
        document.addEventListener('click', function initAudio() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
            }
            document.removeEventListener('click', initAudio);
        }, { once: true });

        /* ==========================================
           INIT
        ========================================== */
        (async function init() {
            const user = await checkAuth(['preparation', 'administration']);
            if (!user) return;
            document.getElementById('user-nom').textContent = user.nom;
            await loadCommandes(true); // premier chargement avec loader
            startAutoRefresh();
        })();

        /* ==========================================
           AUTO-REFRESH
        ========================================== */
        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => loadCommandes(false), REFRESH_INTERVAL);
        }

        /* ==========================================
           CHARGEMENT DES COMMANDES
        ========================================== */
        async function loadCommandes(showLoader = false) {
            if (showLoader) document.getElementById('loading-overlay').classList.add('show');

            try {
                const res = await apiFetch('/api/admin/commandes');
                if (!res) return;
                const result = await res.json();
                if (!result.success) { showToast('Erreur chargement commandes', 'error'); return; }

                const toutes = result.data || [];
                const nouvelles = toutes.filter(c => c.statut === 'en_attente');

                // Détecter si de nouvelles commandes sont apparues (par rapport à l'état précédent)
                const ancienIds = new Set(commandesEnAttente.map(c => c.id));
                const nouvellesIds = nouvelles.filter(c => !ancienIds.has(c.id));
                if (nouvellesIds.length > 0 && commandesEnAttente.length > 0) {
                    // Pas au 1er chargement — seulement au refresh
                    playNotifSound();
                    showToast(`🔔 ${nouvellesIds.length} nouvelle(s) commande(s) !`, 'info');
                }

                commandesEnAttente = nouvelles;
                renderCommandes();

                // Mettre à jour le compteur et l'heure
                document.getElementById('count-attente').textContent = nouvelles.length;
                document.getElementById('last-refresh').textContent =
                    'Mis à jour à ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            } catch (err) {
                console.error('Erreur loadCommandes:', err);
                showToast('Erreur réseau', 'error');
            } finally {
                document.getElementById('loading-overlay').classList.remove('show');
            }
        }

        /* ==========================================
           RENDU DES CARDS
        ========================================== */
        function renderCommandes() {
            const grid       = document.getElementById('orders-grid');
            const emptyState = document.getElementById('empty-state');

            if (!commandesEnAttente.length) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            // Trier par date de création (plus ancienne en premier)
            const sorted = [...commandesEnAttente].sort((a, b) =>
                new Date(a.date_creation || 0) - new Date(b.date_creation || 0)
            );

            grid.innerHTML = sorted.map(c => buildOrderCard(c)).join('');
        }

        function buildOrderCard(c) {
            const typeClass = c.type_commande === 'sur_place' ? 'type-sur-place' : 'type-a-emporter';
            const typeLabel = c.type_commande === 'sur_place' ? '🪑 Sur place' : '🥡 À emporter';

            // Gestion de l'heure de livraison — rouge si < 5 min
            let heureHtml = '';
            if (c.heure_livraison) {
                const now  = new Date();
                const livr = new Date();
                const [h, m] = c.heure_livraison.split(':');
                livr.setHours(parseInt(h), parseInt(m), 0, 0);
                const diffMin = (livr - now) / 60000;
                const cls = diffMin < 5 ? 'heure-urgente' : 'heure-normale';
                heureHtml = `<span class="heure-livraison ${cls}">⏰ ${c.heure_livraison}</span>`;
            }

            // Liste des produits
            const produits = Array.isArray(c.lignes) ? c.lignes : (Array.isArray(c.produits) ? c.produits : []);
            const produitsHtml = produits.length
                ? `<div class="products-title">Produits</div>
                   <ul class="products-list">
                       ${produits.map(p => `
                           <li>
                               <span>${p.nom_produit || p.nom || 'Produit'}</span>
                               <span class="qty">×${p.quantite || 1}</span>
                           </li>`).join('')}
                   </ul>`
                : '<p style="color:rgba(255,255,255,0.3);font-size:0.82rem;font-style:italic;">Détail non disponible</p>';

            return `
                <div class="order-card" id="card-${c.id}">
                    <div class="card-top">
                        <div class="order-num">
                            #${c.numero_commande || c.id}
                            <span>Commande</span>
                        </div>
                        <span class="type-badge ${typeClass}">${typeLabel}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <span class="chevalet">🏷️ Chevalet ${c.numero_chevalet || '—'}</span>
                            ${heureHtml}
                        </div>
                        ${produitsHtml}
                    </div>
                    <div class="card-footer">
                        <button class="btn-prete" onclick="marquerPrete(${c.id}, this)">
                            ✓ Commande prête
                        </button>
                    </div>
                </div>`;
        }

        /* ==========================================
           MARQUER UNE COMMANDE COMME PRÊTE
        ========================================== */
        async function marquerPrete(id, btn) {
            btn.disabled = true;
            btn.textContent = '⏳ Traitement…';

            try {
                const res = await apiFetch(`/api/admin/commandes/${id}/preparer`, { method: 'PUT' });
                if (!res) { btn.disabled = false; btn.textContent = '✓ Commande prête'; return; }

                const result = await res.json();
                if (result.success) {
                    // Animation de sortie de la card
                    const card = document.getElementById(`card-${id}`);
                    if (card) {
                        card.style.transition = 'opacity 0.3s, transform 0.3s';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.95)';
                        setTimeout(() => {
                            card.remove();
                            // Retirer de l'état local
                            commandesEnAttente = commandesEnAttente.filter(c => c.id !== id);
                            document.getElementById('count-attente').textContent = commandesEnAttente.length;
                            if (!commandesEnAttente.length) {
                                document.getElementById('empty-state').style.display = 'block';
                            }
                        }, 300);
                    }
                    showToast('✅ Commande marquée comme prête !');
                } else {
                    showToast(result.error || 'Erreur lors de la mise à jour.', 'error');
                    btn.disabled = false; btn.textContent = '✓ Commande prête';
                }
            } catch (err) {
                console.error(err);
                showToast('Erreur réseau', 'error');
                btn.disabled = false; btn.textContent = '✓ Commande prête';
            }
        }
    </script>
</body>
</html>

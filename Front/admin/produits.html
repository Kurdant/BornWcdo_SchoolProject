<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCDO Admin — Produits</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .layout { display: flex; min-height: 100vh; }

        /* === SIDEBAR === */
        .sidebar {
            width: 260px; min-height: 100vh; background: #16213e; color: #fff;
            display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
        }
        .sidebar-header { padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo { font-size: 1.4rem; font-weight: 900; color: #e63946; letter-spacing: 1px; }
        .user-block { margin-top: 0.85rem; }
        .user-nom { display: block; font-weight: 600; font-size: 0.9rem; color: #fff; }
        .user-role-badge {
            display: inline-block; margin-top: 0.3rem; padding: 0.15rem 0.6rem;
            border-radius: 12px; font-size: 0.72rem; font-weight: 700;
            background: rgba(230,57,70,0.2); color: #e63946; border: 1px solid rgba(230,57,70,0.4);
        }
        .sidebar-nav { flex: 1; padding: 0.75rem 0; }
        .nav-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.85rem 1.25rem; color: rgba(255,255,255,0.65);
            text-decoration: none; font-size: 0.92rem;
            transition: background 0.15s, color 0.15s; border-left: 3px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .nav-item.active { background: rgba(230,57,70,0.12); color: #e63946; border-left-color: #e63946; font-weight: 600; }
        .btn-logout {
            margin: 1rem 1.25rem; padding: 0.7rem;
            background: rgba(230,57,70,0.12); color: #e63946;
            border: 1px solid rgba(230,57,70,0.35); border-radius: 8px;
            cursor: pointer; font-size: 0.88rem; font-family: inherit; font-weight: 600;
            width: calc(100% - 2.5rem); transition: background 0.2s, color 0.2s;
        }
        .btn-logout:hover { background: #e63946; color: #fff; }

        /* === MAIN === */
        .main-content { margin-left: 260px; flex: 1; padding: 2rem; }
        .page-header {
            margin-bottom: 2rem; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 1rem;
        }
        .page-header h1 { font-size: 1.7rem; font-weight: 800; color: #1a1a2e; }
        .page-actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }

        /* === CARD & TABLE === */
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); overflow: hidden; }
        .card-header {
            padding: 1.1rem 1.5rem; border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-header h2 { font-size: 1.05rem; font-weight: 700; color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #1a1a2e; color: #fff; padding: 0.85rem 1rem;
            text-align: left; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        td { padding: 0.8rem 1rem; border-bottom: 1px solid #f4f4f4; font-size: 0.88rem; color: #444; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) td { background: #fafafa; }
        tr:hover td { background: #f5f5f5; }
        .loading-row td, .empty-row td { text-align: center; padding: 2.5rem; color: #aaa; font-style: italic; }

        /* === COMPOSANTS === */
        .search-bar {
            padding: 0.65rem 1rem; border: 2px solid #e0e0e0; border-radius: 6px;
            font-size: 0.9rem; font-family: inherit; outline: none; width: 260px;
            transition: border-color 0.2s;
        }
        .search-bar:focus { border-color: #e63946; }

        .btn { padding: 0.6rem 1.1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-family: inherit; font-weight: 600; transition: background 0.2s, opacity 0.2s; }
        .btn-primary  { background: #e63946; color: #fff; }
        .btn-primary:hover  { background: #c1121f; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #545d66; }
        .btn-success  { background: #2a9d8f; color: #fff; }
        .btn-success:hover  { background: #21867a; }
        .btn-danger   { background: rgba(230,57,70,0.1); color: #e63946; border: 1px solid rgba(230,57,70,0.3); padding: 0.4rem 0.6rem; font-size: 0.9rem; }
        .btn-danger:hover   { background: #e63946; color: #fff; }
        .btn-edit     { background: rgba(33,150,243,0.1); color: #1565c0; border: 1px solid rgba(33,150,243,0.3); padding: 0.4rem 0.6rem; font-size: 0.9rem; }
        .btn-edit:hover     { background: #1565c0; color: #fff; }

        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 700; }
        .badge-green  { background: rgba(42,157,143,0.12); color: #1b7a6d; border: 1px solid rgba(42,157,143,0.3); }
        .badge-gray   { background: rgba(108,117,125,0.1); color: #555; border: 1px solid rgba(108,117,125,0.25); }

        .img-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: #eee; }
        .img-placeholder { width: 48px; height: 48px; border-radius: 6px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .stock-zero { color: #e63946; font-weight: 700; }
        .stock-low  { color: #e65100; font-weight: 600; }
        .actions-cell { display: flex; gap: 0.4rem; }

        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.08); border-top-color: #e63946; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === MODAL === */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 12px; padding: 2rem;
            width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 16px 48px rgba(0,0,0,0.25);
        }
        .modal h3 { font-size: 1.15rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-size: 0.83rem; font-weight: 600; color: #555; margin-bottom: 0.35rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.65rem 0.85rem; border: 2px solid #e8e8e8; border-radius: 6px;
            font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #e63946; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-check { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem; }
        .form-check input[type="checkbox"] { width: auto; cursor: pointer; }
        .form-check label { font-size: 0.9rem; color: #444; cursor: pointer; font-weight: 400; margin: 0; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #f0f0f0; }

        /* === TOAST === */
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.8rem 1.2rem; border-radius: 8px; color: #fff; font-size: 0.88rem; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); min-width: 240px; animation: slideIn 0.3s ease; }
        .toast-success { background: #2a9d8f; }
        .toast-error   { background: #e63946; }
        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
<div class="layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🍔 WCDO Admin</div>
            <div class="user-block">
                <span class="user-nom" id="user-nom">…</span>
                <span class="user-role-badge" id="user-role"></span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"        class="nav-item">📊 Dashboard</a>
            <a href="produits.html"     class="nav-item active">📦 Produits</a>
            <a href="menus.html"        class="nav-item">🍔 Menus</a>
            <a href="utilisateurs.html" class="nav-item">👥 Utilisateurs</a>
        </nav>
        <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="main-content">
        <div class="page-header">
            <h1>📦 Produits</h1>
            <div class="page-actions">
                <input type="search" class="search-bar" id="search-input" placeholder="🔍 Rechercher un produit…">
                <button class="btn btn-primary" onclick="openModal('create')">➕ Ajouter un produit</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Catalogue produits</h2>
                <span id="produits-count" style="color:#888;font-size:0.88rem;"></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Nom</th>
                        <th>Catégorie</th>
                        <th>Prix</th>
                        <th>Stock</th>
                        <th>Dispo</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="produits-tbody">
                    <tr class="loading-row"><td colspan="7"><span class="spinner"></span> Chargement…</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- ===== MODAL PRODUIT ===== -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">Ajouter un produit</h3>
        <form id="produit-form" novalidate>
            <input type="hidden" id="produit-id">
            <div class="form-group">
                <label for="f-nom">Nom du produit *</label>
                <input type="text" id="f-nom" required placeholder="Ex : Big Mac">
            </div>
            <div class="form-group">
                <label for="f-description">Description</label>
                <textarea id="f-description" placeholder="Description courte du produit…"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="f-prix">Prix (€) *</label>
                    <input type="number" id="f-prix" min="0" step="0.01" required placeholder="5.90">
                </div>
                <div class="form-group">
                    <label for="f-stock">Stock</label>
                    <input type="number" id="f-stock" min="0" step="1" placeholder="100">
                </div>
            </div>
            <div class="form-group">
                <label for="f-categorie">Catégorie *</label>
                <select id="f-categorie" required>
                    <option value="">— Sélectionner —</option>
                </select>
            </div>
            <div class="form-group">
                <label for="f-image">URL de l'image</label>
                <input type="url" id="f-image" placeholder="https://…/image.jpg">
            </div>
            <div class="form-group">
                <div class="form-check">
                    <input type="checkbox" id="f-disponible" checked>
                    <label for="f-disponible">Produit disponible à la vente</label>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                <button type="submit" class="btn btn-success" id="btn-save">💾 Sauvegarder</button>
            </div>
        </form>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
    /* ==========================================
       ÉTAT GLOBAL
    ========================================== */
    let allProduits  = [];   // cache local des produits
    let allCategories = [];  // cache local des catégories
    let editMode = false;    // true = modification, false = création

    /* ==========================================
       UTILITAIRES
    ========================================== */
    async function checkAuth(roles = []) {
        const role = sessionStorage.getItem('admin_role');
        const nom  = sessionStorage.getItem('admin_nom');
        if (!role) { window.location.href = 'login.html'; return null; }
        if (roles.length && !roles.includes(role)) { window.location.href = 'index.html'; return null; }
        return { role, nom };
    }
    async function logout() {
        try { await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
        sessionStorage.clear(); window.location.href = 'login.html';
    }
    function showToast(msg, type = 'success') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`; t.textContent = msg; c.appendChild(t);
        setTimeout(() => { t.style.transition = 'opacity 0.3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    }
    async function apiFetch(url, options = {}) {
        const res = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...options });
        if (res.status === 401) { window.location.href = 'login.html'; return null; }
        return res;
    }

    /* ==========================================
       INITIALISATION
    ========================================== */
    (async function init() {
        const user = await checkAuth(['administration']);
        if (!user) return;
        document.getElementById('user-nom').textContent  = user.nom;
        document.getElementById('user-role').textContent = user.role;

        await Promise.all([loadProduits(), loadCategories()]);
    })();

    /* ==========================================
       CHARGEMENT DES PRODUITS
    ========================================== */
    async function loadProduits() {
        try {
            const res = await apiFetch('/api/admin/produits');
            if (!res) return;
            const result = await res.json();
            if (!result.success) { showToast('Erreur chargement produits', 'error'); return; }
            allProduits = result.data || [];
            renderProduits(allProduits);
        } catch (err) {
            console.error(err); showToast('Erreur réseau', 'error');
        }
    }

    async function loadCategories() {
        try {
            const res = await apiFetch('/api/categories');
            if (!res) return;
            const result = await res.json();
            if (!result.success) return;
            allCategories = result.data || [];
            // Remplir le select catégorie du modal
            const select = document.getElementById('f-categorie');
            select.innerHTML = '<option value="">— Sélectionner —</option>' +
                allCategories.map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
        } catch (err) { console.error(err); }
    }

    /* ==========================================
       RENDU DU TABLEAU
    ========================================== */
    function renderProduits(list) {
        const tbody = document.getElementById('produits-tbody');
        document.getElementById('produits-count').textContent = `${list.length} produit(s)`;

        if (!list.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Aucun produit trouvé</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(p => {
            const catNom = (allCategories.find(c => c.id == p.id_categorie) || {}).nom || '—';
            const stockClass = p.stock == 0 ? 'stock-zero' : (p.stock < 10 ? 'stock-low' : '');
            const imgHtml = p.image
                ? `<img src="${p.image}" alt="${p.nom}" class="img-thumb" onerror="this.style.display='none'">`
                : `<div class="img-placeholder">🍔</div>`;
            const dispoBadge = p.disponible
                ? `<span class="badge badge-green">✓ Dispo</span>`
                : `<span class="badge badge-gray">✗ Indispo</span>`;

            return `
                <tr>
                    <td>${imgHtml}</td>
                    <td><strong>${p.nom}</strong></td>
                    <td>${catNom}</td>
                    <td><strong>${parseFloat(p.prix || 0).toFixed(2)} €</strong></td>
                    <td class="${stockClass}">${p.stock ?? '—'}</td>
                    <td>${dispoBadge}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-edit" onclick="openModal('edit', ${p.id})" title="Modifier">✏️</button>
                            <button class="btn btn-danger" onclick="deleteProduit(${p.id}, '${p.nom.replace(/'/g, "\\'")}')" title="Supprimer">🗑️</button>
                        </div>
                    </td>
                </tr>`;
        }).join('');
    }

    /* ==========================================
       RECHERCHE CÔTÉ CLIENT
    ========================================== */
    document.getElementById('search-input').addEventListener('input', function () {
        const q = this.value.toLowerCase().trim();
        renderProduits(q ? allProduits.filter(p => p.nom.toLowerCase().includes(q)) : allProduits);
    });

    /* ==========================================
       MODAL — OUVERTURE
    ========================================== */
    function openModal(mode, id = null) {
        editMode = mode === 'edit';
        const form = document.getElementById('produit-form');
        form.reset();

        if (editMode && id !== null) {
            const p = allProduits.find(x => x.id == id);
            if (!p) return;
            document.getElementById('modal-title').textContent   = '✏️ Modifier le produit';
            document.getElementById('produit-id').value          = p.id;
            document.getElementById('f-nom').value               = p.nom || '';
            document.getElementById('f-description').value       = p.description || '';
            document.getElementById('f-prix').value              = p.prix || '';
            document.getElementById('f-stock').value             = p.stock ?? '';
            document.getElementById('f-categorie').value         = p.id_categorie || '';
            document.getElementById('f-image').value             = p.image || '';
            document.getElementById('f-disponible').checked      = !!p.disponible;
        } else {
            document.getElementById('modal-title').textContent = '➕ Ajouter un produit';
            document.getElementById('f-disponible').checked = true;
        }

        document.getElementById('modal-overlay').classList.add('open');
        document.getElementById('f-nom').focus();
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
    }

    // Fermer en cliquant sur le fond
    document.getElementById('modal-overlay').addEventListener('click', function (e) {
        if (e.target === this) closeModal();
    });

    /* ==========================================
       MODAL — SAUVEGARDE
    ========================================== */
    document.getElementById('produit-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const nom    = document.getElementById('f-nom').value.trim();
        const prix   = parseFloat(document.getElementById('f-prix').value);
        const catId  = document.getElementById('f-categorie').value;

        if (!nom || isNaN(prix) || !catId) {
            showToast('Nom, prix et catégorie sont obligatoires.', 'error'); return;
        }

        const body = {
            nom,
            description:  document.getElementById('f-description').value.trim(),
            prix,
            stock:        parseInt(document.getElementById('f-stock').value) || 0,
            id_categorie: parseInt(catId),
            image:        document.getElementById('f-image').value.trim() || null,
            disponible:   document.getElementById('f-disponible').checked ? 1 : 0
        };

        const btn = document.getElementById('btn-save');
        btn.disabled = true; btn.textContent = '⏳ Sauvegarde…';

        try {
            const id  = document.getElementById('produit-id').value;
            const url = editMode ? `/api/admin/produits/${id}` : '/api/admin/produits';
            const method = editMode ? 'PUT' : 'POST';

            const res = await apiFetch(url, { method, body: JSON.stringify(body) });
            if (!res) return;
            const result = await res.json();

            if (result.success) {
                showToast(editMode ? '✅ Produit modifié !' : '✅ Produit créé !');
                closeModal();
                await loadProduits();
            } else {
                showToast(result.error || 'Erreur lors de la sauvegarde.', 'error');
            }
        } catch (err) {
            console.error(err); showToast('Erreur réseau', 'error');
        } finally {
            btn.disabled = false; btn.textContent = '💾 Sauvegarder';
        }
    });

    /* ==========================================
       SUPPRESSION
    ========================================== */
    async function deleteProduit(id, nom) {
        if (!confirm(`Supprimer le produit "${nom}" ?\n\nCette action est irréversible.`)) return;

        try {
            const res = await apiFetch(`/api/admin/produits/${id}`, { method: 'DELETE' });
            if (!res) return;
            const result = await res.json();
            if (result.success) {
                showToast('🗑️ Produit supprimé.');
                await loadProduits();
            } else {
                showToast(result.error || 'Erreur suppression.', 'error');
            }
        } catch (err) {
            console.error(err); showToast('Erreur réseau', 'error');
        }
    }
</script>
</body>
</html>

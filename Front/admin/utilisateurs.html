<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCDO Admin — Utilisateurs</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .layout { display: flex; min-height: 100vh; }

        /* === SIDEBAR === */
        .sidebar { width: 260px; min-height: 100vh; background: #16213e; color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
        .sidebar-header { padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo { font-size: 1.4rem; font-weight: 900; color: #e63946; letter-spacing: 1px; }
        .user-block { margin-top: 0.85rem; }
        .user-nom { display: block; font-weight: 600; font-size: 0.9rem; color: #fff; }
        .user-role-badge { display: inline-block; margin-top: 0.3rem; padding: 0.15rem 0.6rem; border-radius: 12px; font-size: 0.72rem; font-weight: 700; background: rgba(230,57,70,0.2); color: #e63946; border: 1px solid rgba(230,57,70,0.4); }
        .sidebar-nav { flex: 1; padding: 0.75rem 0; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.25rem; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.92rem; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .nav-item.active { background: rgba(230,57,70,0.12); color: #e63946; border-left-color: #e63946; font-weight: 600; }
        .btn-logout { margin: 1rem 1.25rem; padding: 0.7rem; background: rgba(230,57,70,0.12); color: #e63946; border: 1px solid rgba(230,57,70,0.35); border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-family: inherit; font-weight: 600; width: calc(100% - 2.5rem); transition: background 0.2s, color 0.2s; }
        .btn-logout:hover { background: #e63946; color: #fff; }

        /* === MAIN === */
        .main-content { margin-left: 260px; flex: 1; padding: 2rem; }
        .page-header { margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .page-header h1 { font-size: 1.7rem; font-weight: 800; color: #1a1a2e; }

        /* === CARD & TABLE === */
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); overflow: hidden; }
        .card-header { padding: 1.1rem 1.5rem; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
        .card-header h2 { font-size: 1.05rem; font-weight: 700; color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a2e; color: #fff; padding: 0.85rem 1rem; text-align: left; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 0.85rem 1rem; border-bottom: 1px solid #f4f4f4; font-size: 0.88rem; color: #444; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) td { background: #fafafa; }
        tr:hover td { background: #f5f5f5; }
        .loading-row td, .empty-row td { text-align: center; padding: 2.5rem; color: #aaa; font-style: italic; }

        /* === COMPOSANTS === */
        .btn { padding: 0.6rem 1.1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-family: inherit; font-weight: 600; transition: background 0.2s; }
        .btn-primary  { background: #e63946; color: #fff; } .btn-primary:hover  { background: #c1121f; }
        .btn-secondary { background: #6c757d; color: #fff; } .btn-secondary:hover { background: #545d66; }
        .btn-success  { background: #2a9d8f; color: #fff; } .btn-success:hover  { background: #21867a; }
        .btn-danger   { background: rgba(230,57,70,0.1); color: #e63946; border: 1px solid rgba(230,57,70,0.3); padding: 0.4rem 0.6rem; font-size: 0.9rem; } .btn-danger:hover  { background: #e63946; color: #fff; }
        .btn-edit     { background: rgba(33,150,243,0.1); color: #1565c0; border: 1px solid rgba(33,150,243,0.3); padding: 0.4rem 0.6rem; font-size: 0.9rem; } .btn-edit:hover    { background: #1565c0; color: #fff; }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .actions-cell { display: flex; gap: 0.4rem; }

        /* Badges de rôle */
        .badge { display: inline-block; padding: 0.22rem 0.65rem; border-radius: 12px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.3px; }
        .badge-admin   { background: rgba(139,0,20,0.12); color: #8b0000; border: 1px solid rgba(139,0,20,0.3); }
        .badge-prep    { background: rgba(255,152,0,0.12); color: #d84315; border: 1px solid rgba(255,152,0,0.3); }
        .badge-accueil { background: rgba(33,150,243,0.12); color: #1565c0; border: 1px solid rgba(33,150,243,0.3); }

        /* Avatar initiales */
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #e63946; color: #fff; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .user-cell { display: flex; align-items: center; gap: 0.75rem; }

        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.08); border-top-color: #e63946; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === MODAL === */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.25); }
        .modal h3 { font-size: 1.15rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-size: 0.83rem; font-weight: 600; color: #555; margin-bottom: 0.35rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.65rem 0.85rem; border: 2px solid #e8e8e8; border-radius: 6px; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #e63946; }
        .input-hint { font-size: 0.78rem; color: #aaa; margin-top: 0.3rem; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #f0f0f0; }

        /* === TOAST === */
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.8rem 1.2rem; border-radius: 8px; color: #fff; font-size: 0.88rem; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); min-width: 240px; animation: slideIn 0.3s ease; }
        .toast-success { background: #2a9d8f; } .toast-error { background: #e63946; }
        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
<div class="layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🍔 WCDO Admin</div>
            <div class="user-block">
                <span class="user-nom" id="user-nom">…</span>
                <span class="user-role-badge" id="user-role"></span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"        class="nav-item">📊 Dashboard</a>
            <a href="produits.html"     class="nav-item">📦 Produits</a>
            <a href="menus.html"        class="nav-item">🍔 Menus</a>
            <a href="utilisateurs.html" class="nav-item active">👥 Utilisateurs</a>
        </nav>
        <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="main-content">
        <div class="page-header">
            <h1>👥 Utilisateurs</h1>
            <button class="btn btn-primary" onclick="openModal('create')">➕ Ajouter un utilisateur</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Comptes internes</h2>
                <span id="users-count" style="color:#888;font-size:0.88rem;"></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Utilisateur</th>
                        <th>Email</th>
                        <th>Rôle</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr class="loading-row"><td colspan="4"><span class="spinner"></span> Chargement…</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- ===== MODAL UTILISATEUR ===== -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">Ajouter un utilisateur</h3>
        <form id="user-form" novalidate>
            <input type="hidden" id="user-id">
            <div class="form-group">
                <label for="f-nom">Nom complet *</label>
                <input type="text" id="f-nom" required placeholder="Jean Dupont">
            </div>
            <div class="form-group">
                <label for="f-email">Adresse email *</label>
                <input type="email" id="f-email" required placeholder="jean@wcdo.fr">
            </div>
            <div class="form-group">
                <label for="f-role">Rôle *</label>
                <select id="f-role" required>
                    <option value="">— Sélectionner —</option>
                    <option value="administration">🔴 Administration</option>
                    <option value="preparation">🟠 Préparation</option>
                    <option value="accueil">🔵 Accueil</option>
                </select>
            </div>
            <div class="form-group">
                <label for="f-password">Mot de passe <span id="pwd-required-label">*</span></label>
                <input type="password" id="f-password" placeholder="••••••••" autocomplete="new-password">
                <div class="input-hint" id="pwd-hint" style="display:none;">Laisser vide pour conserver le mot de passe actuel.</div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                <button type="submit" class="btn btn-success" id="btn-save">💾 Sauvegarder</button>
            </div>
        </form>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
    /* === ÉTAT === */
    let allUsers = [];
    let editMode = false;
    let currentUserId; // ID de l'utilisateur connecté

    /* === UTILS === */
    async function checkAuth(roles = []) {
        const role = sessionStorage.getItem('admin_role');
        const nom  = sessionStorage.getItem('admin_nom');
        if (!role) { window.location.href = 'login.html'; return null; }
        if (roles.length && !roles.includes(role)) { window.location.href = 'index.html'; return null; }
        return { role, nom };
    }
    async function logout() {
        try { await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
        sessionStorage.clear(); window.location.href = 'login.html';
    }
    function showToast(msg, type = 'success') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`; t.textContent = msg; c.appendChild(t);
        setTimeout(() => { t.style.transition = 'opacity 0.3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    }
    async function apiFetch(url, options = {}) {
        const res = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...options });
        if (res.status === 401) { window.location.href = 'login.html'; return null; }
        return res;
    }

    // Initiales pour l'avatar
    function initials(nom) {
        return (nom || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    /* === INIT === */
    (async function init() {
        const user = await checkAuth(['administration']);
        if (!user) return;
        currentUserId = parseInt(sessionStorage.getItem('admin_id'));
        document.getElementById('user-nom').textContent  = user.nom;
        document.getElementById('user-role').textContent = user.role;
        await loadUsers();
    })();

    /* === CHARGEMENT === */
    async function loadUsers() {
        try {
            const res = await apiFetch('/api/admin/utilisateurs');
            if (!res) return;
            const result = await res.json();
            if (!result.success) { showToast('Erreur chargement utilisateurs', 'error'); return; }
            allUsers = result.data || [];
            renderUsers();
        } catch (e) { console.error(e); showToast('Erreur réseau', 'error'); }
    }

    /* === RENDU === */
    function renderUsers() {
        const tbody = document.getElementById('users-tbody');
        document.getElementById('users-count').textContent = `${allUsers.length} utilisateur(s)`;

        if (!allUsers.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Aucun utilisateur trouvé</td></tr>';
            return;
        }

        const roleBadge = {
            'administration': '<span class="badge badge-admin">Administration</span>',
            'preparation':    '<span class="badge badge-prep">Préparation</span>',
            'accueil':        '<span class="badge badge-accueil">Accueil</span>'
        };

        tbody.innerHTML = allUsers.map(u => {
            const isSelf = u.id === currentUserId;
            const selfTag = isSelf ? ' <span style="font-size:0.72rem;color:#888">(vous)</span>' : '';
            const disabledAttr = isSelf ? 'disabled title="Impossible de modifier/supprimer votre propre compte"' : '';

            return `
                <tr>
                    <td>
                        <div class="user-cell">
                            <div class="avatar">${initials(u.nom)}</div>
                            <strong>${u.nom}${selfTag}</strong>
                        </div>
                    </td>
                    <td>${u.email}</td>
                    <td>${roleBadge[u.role] || u.role}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-edit" onclick="openModal('edit',${u.id})" ${disabledAttr}>✏️</button>
                            <button class="btn btn-danger" onclick="deleteUser(${u.id},'${u.nom.replace(/'/g,"\\'")}','${u.email}')" ${disabledAttr}>🗑️</button>
                        </div>
                    </td>
                </tr>`;
        }).join('');
    }

    /* === MODAL === */
    function openModal(mode, id = null) {
        editMode = mode === 'edit';
        document.getElementById('user-form').reset();

        const pwdHint    = document.getElementById('pwd-hint');
        const pwdLabel   = document.getElementById('pwd-required-label');

        if (editMode && id !== null) {
            const u = allUsers.find(x => x.id == id);
            if (!u) return;
            document.getElementById('modal-title').textContent = '✏️ Modifier l\'utilisateur';
            document.getElementById('user-id').value           = u.id;
            document.getElementById('f-nom').value             = u.nom || '';
            document.getElementById('f-email').value           = u.email || '';
            document.getElementById('f-role').value            = u.role || '';
            pwdHint.style.display  = 'block';
            pwdLabel.textContent   = '(optionnel)';
            document.getElementById('f-password').removeAttribute('required');
        } else {
            document.getElementById('modal-title').textContent = '➕ Nouvel utilisateur';
            pwdHint.style.display  = 'none';
            pwdLabel.textContent   = '*';
            document.getElementById('f-password').setAttribute('required', 'required');
        }

        document.getElementById('modal-overlay').classList.add('open');
        document.getElementById('f-nom').focus();
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
    }
    document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    /* === SAUVEGARDE === */
    document.getElementById('user-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const nom      = document.getElementById('f-nom').value.trim();
        const email    = document.getElementById('f-email').value.trim();
        const role     = document.getElementById('f-role').value;
        const password = document.getElementById('f-password').value;

        if (!nom || !email || !role) { showToast('Nom, email et rôle sont obligatoires.', 'error'); return; }
        if (!editMode && !password)  { showToast('Le mot de passe est obligatoire pour un nouvel utilisateur.', 'error'); return; }

        const body = { nom, email, role };
        if (password) body.mot_de_passe = password;

        const btn = document.getElementById('btn-save');
        btn.disabled = true; btn.textContent = '⏳ Sauvegarde…';

        try {
            const id  = document.getElementById('user-id').value;
            const url = editMode ? `/api/admin/utilisateurs/${id}` : '/api/admin/utilisateurs';
            const res = await apiFetch(url, { method: editMode ? 'PUT' : 'POST', body: JSON.stringify(body) });
            if (!res) return;
            const result = await res.json();
            if (result.success) {
                showToast(editMode ? '✅ Utilisateur modifié !' : '✅ Utilisateur créé !');
                closeModal();
                await loadUsers();
            } else {
                showToast(result.error || 'Erreur sauvegarde.', 'error');
            }
        } catch (err) { console.error(err); showToast('Erreur réseau', 'error'); }
        finally { btn.disabled = false; btn.textContent = '💾 Sauvegarder'; }
    });

    /* === SUPPRESSION === */
    async function deleteUser(id, nom, email) {
        if (!confirm(`Supprimer l'utilisateur "${nom}" (${email}) ?\n\nCette action est irréversible.`)) return;
        try {
            const res = await apiFetch(`/api/admin/utilisateurs/${id}`, { method: 'DELETE' });
            if (!res) return;
            const result = await res.json();
            if (result.success) { showToast('🗑️ Utilisateur supprimé.'); await loadUsers(); }
            else showToast(result.error || 'Erreur suppression.', 'error');
        } catch (err) { console.error(err); showToast('Erreur réseau', 'error'); }
    }
</script>
</body>
</html>

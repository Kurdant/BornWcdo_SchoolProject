<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/table-number.css">
    <title>Numéro de retrait</title>
</head>
<body>
    <div class="background-image"></div>
    <div class="table-number-box">
        <div class="table-number-img">
            <img src="/images/images/illustration-chevalet.png" alt="Numéro de retrait de commande" />
        </div>
        <div class="table-number-content">
            <h1>Indiquez votre numéro d'identification</h1>
            <p class="table-number-help">
                Ce numéro sera affecté à votre commande pour vous permettre de la récupérer au comptoir.
            </p>
            <div class="table-number-inputs">
                <input type="text" maxlength="1" class="table-digit-input" aria-label="Centaines">
                <input type="text" maxlength="1" class="table-digit-input" aria-label="Dizaines">
                <input type="text" maxlength="1" class="table-digit-input" aria-label="Unités">
            </div>
            <button class="table-number-submit">Valider ma commande</button>
        </div>
    </div>
    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? '/api'
          : 'https://wakdo-back.acadenice.fr/api';

        document.querySelector('.table-number-submit').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.table-digit-input');
            const numero = Array.from(inputs).map(i => i.value || '0').join('');
            const numero_retrait = parseInt(numero, 10);
            if (!numero_retrait || numero_retrait < 1 || numero_retrait > 999) {
                alert('Numéro invalide (entre 001 et 999)');
                return;
            }
            sessionStorage.setItem('numero_chevalet', numero_retrait);

            fetch(`${API_BASE}/commande`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type_commande:   'sur_place',
                    numero_chevalet: numero_retrait,
                    mode_paiement:   'carte',
                    client_id:       sessionStorage.getItem('client_id') ? parseInt(sessionStorage.getItem('client_id')) : null
                })
            })
            .then(r => r.json())
            .then(res => {
                const numeroCommande = res.data && res.data.commande && res.data.commande.numero_commande;
                if (res.success && numeroCommande) {
                    sessionStorage.setItem('numero_commande', numeroCommande);
                    window.location.href = 'remerciement.html';
                } else {
                    alert((res.data && res.data.message) || res.message || res.error || 'Erreur lors de la commande');
                }
            })
            .catch(err => alert('Erreur réseau : ' + err));
        });

        // Auto-focus champ suivant
        document.querySelectorAll('.table-digit-input').forEach((input, i, all) => {
            input.addEventListener('input', () => {
                if (input.value && i < all.length - 1) all[i + 1].focus();
            });
        });
    </script>
</body>
</html>

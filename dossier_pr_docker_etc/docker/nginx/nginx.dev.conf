# ── Frontend statique + proxy /api (port 80 → hôte:8080) ─────
server {
    listen 80;
    server_name _;

    root /app/Front;
    index accueil.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /images/ {
        root /app/Front;
        try_files $uri =404;
    }

    # Proxy /api → PHP-FPM (même origine = pas de CORS, cookies natifs)
    location /api {
        root /app/Backend/public;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /app/Backend/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        include fastcgi_params;
    }
}

# ── Backend API PHP-FPM (port 81 → hôte:8081) ────────────────
server {
    listen 81;
    server_name _;

    root /app/Backend/public;
    index index.php;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }
}
